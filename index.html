<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Chemistry Quiz System</title>
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
        }
        [data-theme='dark'] {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f1f5f9;
        }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            transition: 0.3s ease;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }
        .app-container {
            width: 100%;
            max-width: 900px;
            padding: 40px 20px;
        }
        /* Header & Progress */
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .progress-bar {
            height: 8px; width: 100%; background: #e2e8f0; border-radius: 4px; margin-bottom: 30px; overflow: hidden;
        }
        #progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--primary), var(--secondary)); transition: 0.5s; }

        /* Card Styling */
        .quiz-card {
            background: var(--card);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
            display: none;
            animation: fadeIn 0.4s ease;
        }
        .quiz-card.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .question-text { font-size: 1.25rem; line-height: 1.6; font-weight: 600; margin-bottom: 25px; }

        /* Options */
        .options-grid { display: grid; gap: 12px; margin-bottom: 30px; }
        .option {
            padding: 15px 20px; border: 2px solid #e2e8f0; border-radius: 12px; cursor: pointer;
            transition: all 0.2s; font-weight: 500;
        }
        .option:hover { border-color: var(--primary); background: rgba(99, 102, 241, 0.05); }
        .option.selected { border-color: var(--primary); background: var(--primary); color: white; }

        /* Advanced Canvas */
        .sketch-box { border: 1px solid #cbd5e1; border-radius: 12px; overflow: hidden; background: white; margin-top: 20px; }
        .sketch-tools { background: #f1f5f9; padding: 10px; display: flex; gap: 15px; align-items: center; }
        canvas { display: block; width: 100%; height: 250px; cursor: crosshair; touch-action: none; background: #fff; }

        /* Buttons */
        .nav-btns { display: flex; justify-content: space-between; margin-top: 30px; }
        button {
            padding: 12px 25px; border-radius: 10px; border: none; font-weight: 600; cursor: pointer; transition: 0.2s;
        }
        .btn-next { background: var(--primary); color: white; }
        .btn-prev { background: #cbd5e1; color: var(--text); }
        .btn-theme { background: transparent; border: 1px solid var(--primary); color: var(--primary); }

        #final-score { text-align: center; font-size: 2rem; display: none; }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h2>基礎化學 | 智能測驗系統</h2>
        <button class="btn-theme" onclick="toggleTheme()">切換主題</button>
    </header>
    
    <div class="progress-bar"><div id="progress-fill"></div></div>

    <div id="quiz-container"></div>

    <div class="nav-btns">
        <button class="btn-prev" id="prevBtn" onclick="changeQuestion(-1)" style="visibility:hidden">上一題</button>
        <button class="btn-next" id="nextBtn" onclick="changeQuestion(1)">下一題</button>
    </div>

    <div id="final-score" class="quiz-card">
        <h2>測驗完成！</h2>
        <p id="score-text"></p>
        <button class="btn-next" onclick="location.reload()">重新挑戰</button>
    </div>
</div>

<script>
    const questions = [
        { q: "1. 對某一濃度為0.01 M的未知水溶液進行測試，觀察到下列現象：(1)具極佳導電性 (2)pH值與純水相近 (3)通入二氧化碳會產生白色沉澱 (4)加入等體積0.01 M氫氧化鈉溶液會產生白色沉澱。此溶液最可能含有？", options: ["(A) 氯化鈉", "(B) 氯化鈣", "(C) 蔗糖", "(D) 碳酸鈉", "(E) 氫氧化鉀"], a: 1 },
        { q: "2. 硝酸鉀溶解熱 10.0 kcal/mol，25克硝酸鉀溶於100mL水。若在30°C使用，最低可降到幾度？(KNO3=101, 水比熱=1 cal/g·°C)", options: ["(A) 0", "(B) 5", "(C) 10", "(D) 15"], a: 1 },
        { q: "3. 以0.5 M NaOH(aq)滴定0.2 M CH3COOH(aq) 50 mL，恰中和時溶液溫度上升1.9 °C，則中和熱約為若干 kJ？", options: ["(A) 50", "(B) 53", "(C) 56", "(D) 58"], a: 2 },
        { q: "4. 暖暖包內含40克氧化鈣與100mL水。溶解熱 -82.8 kJ/mol。若起始5°C，最高可升到幾度？(Ca=40)", options: ["(A) 36", "(B) 51", "(C) 76", "(D) 91"], a: 2 },
        { q: "5. 室溫下，pH = 7.0 的純水 100 毫升中含有氫離子數約為幾個？", options: ["(A) 6.0 x 10^15", "(B) 6.0 x 10^16", "(C) 3.3 x 10^17", "(D) 6.0 x 10^18"], a: 0 },
        { q: "6. 反應：x H2C=CH2 + y O2 -> z 環氧乙烷。若符合原子經濟(效率100%)，則 x+y+z 最小整數值為何？", options: ["(A) 4", "(B) 5", "(C) 6", "(D) 7", "(E) 8"], a: 1 },
        { q: "7. 1atm下：1 mol 0°C 的冰變為 100°C 的水蒸氣，其焓含量總變化為多少 kcal？", options: ["(A) 1.44", "(B) 8.26", "(C) 11.40", "(D) 12.94"], a: 3 },
        { q: "8. 已知中和熱為 13.5 kcal。以 0.5 M NaOH 滴定 0.2 M CH3COOH 50 mL 時，溫度約上升多少？", options: ["(A) 0.5", "(B) 1.2", "(C) 1.6", "(D) 1.9", "(E) 2.2"], a: 3 }
    ];

    let currentIdx = 0;
    let answers = new Array(questions.length).fill(null);

    function init() {
        const container = document.getElementById('quiz-container');
        questions.forEach((item, i) => {
            const card = document.createElement('div');
            card.className = `quiz-card ${i === 0 ? 'active' : ''}`;
            card.id = `card-${i}`;
            card.innerHTML = `
                <div class="question-text">${item.q}</div>
                <div class="options-grid">
                    ${item.options.map((opt, optIdx) => `
                        <div class="option" onclick="select(${i}, ${optIdx})" id="opt-${i}-${optIdx}">${opt}</div>
                    `).join('')}
                </div>
                <div class="sketch-box">
                    <div class="sketch-tools">
                        <span>🖊️ 繪圖計算區</span>
                        <button onclick="clearCanvas(${i})">清空</button>
                    </div>
                    <canvas id="canvas-${i}"></canvas>
                </div>
            `;
            container.appendChild(card);
            setupCanvas(i);
        });
        updateProgress();
    }

    function select(qIdx, oIdx) {
        answers[qIdx] = oIdx;
        document.querySelectorAll(`#card-${qIdx} .option`).forEach(el => el.classList.remove('selected'));
        document.getElementById(`opt-${qIdx}-${oIdx}`).classList.add('selected');
        updateProgress();
    }

    function changeQuestion(step) {
        document.getElementById(`card-${currentIdx}`).classList.remove('active');
        currentIdx += step;

        if (currentIdx >= questions.length) {
            showResult();
            return;
        }

        document.getElementById(`card-${currentIdx}`).classList.add('active');
        document.getElementById('prevBtn').style.visibility = currentIdx === 0 ? 'hidden' : 'visible';
        document.getElementById('nextBtn').innerText = currentIdx === questions.length - 1 ? '提交測驗' : '下一題';
        updateProgress();
    }

    function updateProgress() {
        const done = answers.filter(a => a !== null).length;
        document.getElementById('progress-fill').style.width = `${(done / questions.length) * 100}%`;
    }

    function setupCanvas(idx) {
        setTimeout(() => {
            const canvas = document.getElementById(`canvas-${idx}`);
            const ctx = canvas.getContext('2d');
            canvas.width = canvas.offsetWidth; canvas.height = 250;
            let drawing = false;
            const start = (e) => { drawing = true; draw(e); };
            const stop = () => { drawing = false; ctx.beginPath(); };
            const draw = (e) => {
                if (!drawing) return;
                const rect = canvas.getBoundingClientRect();
                const x = (e.clientX || e.touches[0].clientX) - rect.left;
                const y = (e.clientY || e.touches[0].clientY) - rect.top;
                ctx.lineWidth = 2; ctx.lineCap = 'round'; ctx.strokeStyle = '#6366f1';
                ctx.lineTo(x, y); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(x, y);
            };
            canvas.addEventListener('mousedown', start); canvas.addEventListener('mousemove', draw); canvas.addEventListener('mouseup', stop);
            canvas.addEventListener('touchstart', start); canvas.addEventListener('touchmove', draw); canvas.addEventListener('touchend', stop);
        }, 100);
    }

    function clearCanvas(idx) {
        const canvas = document.getElementById(`canvas-${idx}`);
        canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
    }

    function showResult() {
        let score = 0;
        answers.forEach((ans, i) => { if(ans === questions[i].a) score++; });
        document.getElementById('quiz-container').style.display = 'none';
        document.querySelector('.nav-btns').style.display = 'none';
        const final = document.getElementById('final-score');
        final.style.display = 'block';
        document.getElementById('score-text').innerText = `您的得分為：${score} / ${questions.length}`;
    }

    function toggleTheme() {
        const theme = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.body.setAttribute('data-theme', theme);
    }

    window.onload = init;
</script>

</body>
</html>
