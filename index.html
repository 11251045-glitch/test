<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ElitePulse | Certification</title>

<style>
body {
    margin:0;
    font-family: sans-serif;
    background:#0a0a0c;
    color:white;
}

#wrap { max-width:600px; margin:auto; padding:20px; }

.card {
    background:#151518;
    padding:25px;
    border-radius:16px;
}

.opt {
    padding:12px;
    margin:8px 0;
    border:1px solid #333;
    border-radius:10px;
    cursor:pointer;
}

.opt.sel {
    border-color:gold;
    color:gold;
}

button {
    padding:10px 20px;
    border:none;
    border-radius:10px;
    margin-top:15px;
    cursor:pointer;
}

.btn-pri {
    background:gold;
    color:black;
}

.progress {
    margin-bottom:20px;
}

.bar {
    height:6px;
    background:#222;
    border-radius:3px;
}

.fill {
    height:100%;
    background:gold;
    width:0%;
}

#result { display:none; text-align:center; }
</style>
</head>

<body>

<div id="wrap">

<div id="quiz">
    <div class="progress">
        <div class="bar"><div id="fill" class="fill"></div></div>
        <div id="progText"></div>
    </div>

    <div id="qbox"></div>
</div>

<div id="result">
    <h1 id="score"></h1>
    <h2 id="rank"></h2>
    <button onclick="location.reload()">重新測驗</button>
</div>

</div>

<script>
const QS = [
{q:"教練封鎖排班前要做什麼？",o:["直接封鎖","確認身分","聯絡學員","系統自動"],a:1},
{q:"確認信包含？",o:["訓練歷史","課程+聯絡","收據","評分"],a:1},
{q:"Testimonials錯誤？",o:["新增","刪除","控制顯示","排序權重"],a:3},
{q:"新增訓練數據？",o:["輸入email","訊息中心","預約+紀錄","學員自己"],a:2},
{q:"模組數量？",o:["4","5","6","7"],a:2}
];

let cur = 0;
let ans = new Array(QS.length).fill(-1);
let cheatCount = 0;

function render(){
    const q = QS[cur];

    let html = `<div class="card">
    <h3>${q.q}</h3>`;

    q.o.forEach((opt,i)=>{
        html += `
        <div class="opt ${ans[cur]===i?'sel':''}" onclick="pick(${i})">
        ${opt}
        </div>`;
    });

    html += `<button class="btn-pri" onclick="next()">${cur===QS.length-1?'完成':'下一題'}</button></div>`;

    document.getElementById('qbox').innerHTML = html;

    document.getElementById('fill').style.width =
        ((cur+1)/QS.length*100)+'%';

    document.getElementById('progText').innerText =
        `${cur+1}/${QS.length}`;
}

function pick(i){
    ans[cur]=i;
    render();
}

function next(){
    if(ans[cur]===-1){
        alert("請先作答！");
        return;
    }

    if(cur<QS.length-1){
        cur++;
        render();
    } else {
        submit();
    }
}

function submit(){
    let correct=0;
    ans.forEach((a,i)=>{ if(a===QS[i].a) correct++; });

    let score = Math.round(correct/QS.length*100);

    document.getElementById('quiz').style.display='none';
    document.getElementById('result').style.display='block';

    document.getElementById('score').innerText = score+"%";

    let rank = "FAILED";
    if(score>=90) rank="PRO COACH";
    else if(score>=70) rank="CERTIFIED";

    document.getElementById('rank').innerText = rank;
}

/* 防作弊 */
document.addEventListener("visibilitychange",()=>{
    if(document.hidden){
        cheatCount++;
        if(cheatCount>=3){
            alert("作弊偵測，測驗失敗");
            location.reload();
        }
    }
});

render();
</script>

</body>
</html>
