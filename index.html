<!DOCTYPE html>

<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ElitePulse 教練認證測驗</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+TC:wght@300;400;500;700&display=swap');

:root {
–gold: #c9a84c;
–gold-light: #e8c97a;
–dark: #0c0c0c;
–dark2: #141414;
–dark3: #1c1c1c;
–text: #e8e0d0;
–text-dim: #7a7060;
–red: #c0392b;
–green: #27ae60;
–border: rgba(201,168,76,0.18);
–fd: ‘Bebas Neue’, ‘Arial Black’, Impact, sans-serif;
–fb: ‘Noto Sans TC’, ‘PingFang TC’, ‘Microsoft JhengHei’, sans-serif;
}
*,*::before,*::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html { font-size:16px; }
body { background:var(–dark); color:var(–text); font-family:var(–fb); min-height:100vh; overflow-x:hidden; -webkit-font-smoothing:antialiased; }

/* LOCKDOWN */
#lo { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.97); z-index:9999; flex-direction:column; align-items:center; justify-content:center; text-align:center; gap:20px; padding:24px; }
#lo.on { display:flex; }
.lo-icon { font-size:72px; animation:pulsewarn 1s ease-in-out infinite; }
@keyframes pulsewarn { 0%,100%{transform:scale(1);filter:drop-shadow(0 0 16px #c0392b);} 50%{transform:scale(1.08);filter:drop-shadow(0 0 32px #ff2222);} }
.lo-title { font-family:var(–fd); font-size:40px; color:var(–red); letter-spacing:4px; }
.lo-msg { font-size:15px; color:var(–text); line-height:1.8; max-width:360px; }
#lo-count { font-family:var(–fd); font-size:80px; color:var(–gold); letter-spacing:8px; }
#lo-btn { display:none; margin-top:8px; padding:14px 48px; background:var(–gold); color:var(–dark); border:none; font-family:var(–fd); font-size:22px; letter-spacing:3px; cursor:pointer; }

/* BG */
.bg-grid { position:fixed; inset:0; pointer-events:none; z-index:0; background-image:linear-gradient(rgba(201,168,76,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(201,168,76,0.025) 1px,transparent 1px); background-size:56px 56px; }
.bg-glow { position:fixed; pointer-events:none; z-index:0; width:500px; height:500px; top:-180px; right:-180px; background:radial-gradient(circle,rgba(201,168,76,0.05) 0%,transparent 70%); }

/* WRAP */
#wrap { position:relative; z-index:1; max-width:740px; margin:0 auto; padding:52px 20px 100px; }

/* HEADER */
.hdr { text-align:center; margin-bottom:48px; animation:fadein .7s ease both; }
@keyframes fadein { from{opacity:0;transform:translateY(-20px);} to{opacity:1;transform:translateY(0);} }
.brand-tag { font-family:var(–fd); font-size:12px; letter-spacing:7px; color:var(–gold); margin-bottom:10px; }
.main-title { font-family:var(–fd); font-size:clamp(40px,10vw,68px); letter-spacing:3px; color:var(–text); line-height:1; margin-bottom:8px; }
.main-title span { color:var(–gold); }
.sub-tag { font-size:13px; color:var(–text-dim); letter-spacing:2px; margin-bottom:28px; }

/* PROGRESS */
.prog-row { display:flex; align-items:center; gap:14px; margin-bottom:10px; }
.prog-track { flex:1; height:2px; background:rgba(255,255,255,0.07); position:relative; overflow:visible; }
.prog-fill { height:100%; background:linear-gradient(90deg,var(–gold),var(–gold-light)); transition:width .5s cubic-bezier(.4,0,.2,1); position:relative; }
.prog-fill::after { content:’’; position:absolute; right:-4px; top:-3px; width:8px; height:8px; border-radius:50%; background:var(–gold-light); box-shadow:0 0 10px var(–gold); }
.prog-lbl { font-family:var(–fd); font-size:16px; color:var(–gold); min-width:44px; text-align:right; }
.dots { display:flex; gap:5px; justify-content:center; flex-wrap:wrap; margin-top:10px; }
.dot { width:6px; height:6px; border-radius:50%; background:rgba(255,255,255,0.1); transition:all .35s; }
.dot.done { background:var(–gold); }
.dot.cur { background:var(–gold-light); transform:scale(1.7); box-shadow:0 0 6px var(–gold); }

/* CARD */
.card { background:var(–dark2); border:1px solid var(–border); padding:40px 36px 32px; position:relative; overflow:hidden; animation:slideup .4s ease both; }
@keyframes slideup { from{opacity:0;transform:translateY(20px);} to{opacity:1;transform:translateY(0);} }
.card::before { content:’’; position:absolute; top:0; left:0; width:3px; height:100%; background:linear-gradient(180deg,var(–gold),transparent); }
.q-num { font-family:var(–fd); font-size:11px; letter-spacing:4px; color:var(–gold); margin-bottom:18px; display:flex; align-items:center; gap:12px; }
.q-num::after { content:’’; flex:1; height:1px; background:var(–border); }
.q-text { font-size:17px; font-weight:500; line-height:1.75; color:var(–text); margin-bottom:28px; }
.q-hint { font-size:11px; color:var(–text-dim); letter-spacing:2px; text-transform:uppercase; margin-bottom:10px; }

/* OPTIONS */
.opts { display:flex; flex-direction:column; gap:10px; }
.opt { display:flex; align-items:flex-start; gap:14px; padding:14px 18px; background:transparent; border:1px solid rgba(255,255,255,0.07); cursor:pointer; text-align:left; color:var(–text); font-family:var(–fb); font-size:14px; line-height:1.65; transition:border-color .2s,background .2s; width:100%; -webkit-appearance:none; }
.opt:hover { border-color:rgba(201,168,76,0.35); background:rgba(201,168,76,0.04); }
.opt.sel  { border-color:var(–gold); background:rgba(201,168,76,0.07); }
.opt.ok   { border-color:var(–green) !important; background:rgba(39,174,96,0.10) !important; }
.opt.err  { border-color:var(–red) !important; background:rgba(192,57,43,0.10) !important; }
.opt.hint { border-color:rgba(39,174,96,0.4) !important; background:rgba(39,174,96,0.05) !important; }
.opt-key { min-width:26px; height:26px; flex-shrink:0; border:1px solid rgba(255,255,255,0.18); display:flex; align-items:center; justify-content:center; font-family:var(–fd); font-size:13px; color:var(–text-dim); transition:all .2s; margin-top:1px; }
.opt.sel  .opt-key { color:var(–gold);  border-color:var(–gold); }
.opt.ok   .opt-key { color:var(–green); border-color:var(–green); }
.opt.err  .opt-key { color:var(–red);   border-color:var(–red); }
.opt.hint .opt-key { color:var(–green); border-color:var(–green); opacity:.6; }

/* FEEDBACK */
.fb { margin-top:18px; padding:14px 18px; border-left:3px solid; font-size:13px; line-height:1.75; display:none; }
.fb.ok  { border-color:var(–green); background:rgba(39,174,96,0.07); }
.fb.err { border-color:var(–red);   background:rgba(192,57,43,0.07); }
.fb-title { font-weight:700; margin-bottom:5px; font-size:12px; letter-spacing:1px; }
.fb.ok  .fb-title { color:var(–green); }
.fb.err .fb-title { color:var(–red); }

/* NAV */
.q-nav { display:flex; align-items:center; justify-content:space-between; margin-top:28px; padding-top:20px; border-top:1px solid var(–border); gap:10px; }
.nav-btn { padding:11px 24px; border:1px solid var(–border); background:transparent; color:var(–text); font-family:var(–fd); font-size:16px; letter-spacing:3px; cursor:pointer; transition:all .2s; white-space:nowrap; -webkit-appearance:none; }
.nav-btn:hover { border-color:var(–gold); color:var(–gold); }
.nav-btn:disabled { opacity:.2; cursor:not-allowed; }
.nav-btn.pri { background:var(–gold); color:var(–dark); border-color:var(–gold); }
.nav-btn.pri:hover { background:var(–gold-light); }
.score-mini { font-family:var(–fd); font-size:13px; color:var(–text-dim); letter-spacing:2px; white-space:nowrap; }

/* RESULT */
.result { text-align:center; padding:48px 20px; animation:fadein .7s ease both; display:none; }
.result.on { display:block; }
.r-icon { font-size:72px; margin-bottom:20px; }
.r-grade { font-family:var(–fd); font-size:clamp(72px,20vw,110px); color:var(–gold); letter-spacing:4px; line-height:1; text-shadow:0 0 50px rgba(201,168,76,0.35); margin-bottom:4px; }
.r-title { font-family:var(–fd); font-size:28px; letter-spacing:4px; margin-bottom:10px; }
.r-msg { font-size:14px; color:var(–text-dim); line-height:1.85; max-width:440px; margin:0 auto 32px; }
.r-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:1px; background:var(–border); border:1px solid var(–border); max-width:440px; margin:0 auto 32px; }
.r-cell { background:var(–dark2); padding:18px 10px; text-align:center; }
.r-num { font-family:var(–fd); font-size:38px; color:var(–gold); }
.r-lbl { font-size:10px; color:var(–text-dim); letter-spacing:2px; text-transform:uppercase; margin-top:4px; }
.retry-btn { padding:14px 52px; background:transparent; border:1px solid var(–gold); color:var(–gold); font-family:var(–fd); font-size:20px; letter-spacing:4px; cursor:pointer; transition:all .25s; -webkit-appearance:none; }
.retry-btn:active { background:var(–gold); color:var(–dark); }

/* ATTEMPT BADGE */
.a-badge { display:inline-flex; align-items:center; gap:8px; padding:9px 20px; border:1px solid; font-family:var(–fd); font-size:14px; letter-spacing:3px; margin-bottom:20px; position:relative; }
.a-badge::before { content:’’; position:absolute; inset:0; opacity:.06; background:currentColor; }
.a-badge.ok  { color:var(–green); border-color:var(–green); }
.a-badge.bad { color:var(–red);   border-color:var(–red); animation:badgepulse 2s ease-in-out infinite; }
@keyframes badgepulse { 0%,100%{box-shadow:0 0 0 0 rgba(192,57,43,.3);} 50%{box-shadow:0 0 0 8px rgba(192,57,43,0);} }
.a-dot { width:7px; height:7px; border-radius:50%; background:currentColor; animation:dotblink 1.2s ease-in-out infinite; flex-shrink:0; }
@keyframes dotblink { 0%,100%{opacity:1;} 50%{opacity:.25;} }

/* TOAST */
#toast { position:fixed; bottom:28px; left:50%; transform:translateX(-50%); background:var(–dark3); border:1px solid var(–red); color:var(–text); padding:11px 24px; font-size:13px; letter-spacing:1px; z-index:8000; opacity:0; transition:opacity .3s; pointer-events:none; white-space:nowrap; border-radius:2px; }
#toast.on { opacity:1; }

@media (max-width:500px) {
.card { padding:28px 18px 24px; }
.q-text { font-size:15px; }
.r-grid { max-width:280px; grid-template-columns:1fr; }
.main-title { font-size:36px; }
.nav-btn { padding:11px 16px; font-size:14px; letter-spacing:2px; }
}
</style>

</head>
<body>

<div class="bg-grid"></div>
<div class="bg-glow"></div>
<div id="lo">
  <div class="lo-icon">&#128274;</div>
  <div class="lo-title">FOCUS REQUIRED</div>
  <div class="lo-msg">
    偵測到您離開測試頁面。<br>
    本測試要求全程專注，<br>
    請勿切換分頁或最小化視窗。
  </div>
</div>

  <div id="lo-count">5</div>
  <button id="lo-btn" onclick="resumeQuiz()">&#36820;&#22238;&#27979;&#39511;</button>
</div>

<div id="toast"></div>

<div id="wrap">
  <div class="hdr">
    <div class="brand-tag">ELITEPULSE COACHING &middot; &#25945;&#32244;&#35469;&#35611;&#31995;&#32113;</div>
    <h1 class="main-title">&#25805;&#20316;&#25351;&#21335;<span>&#27979;&#39511;</span></h1>
    <p class="sub-tag">COACH CERTIFICATION ASSESSMENT &middot; &#38480;&#26178;&#27169;&#24335;</p>
    <div class="prog-row">
      <div class="prog-track"><div class="prog-fill" id="pfill" style="width:0%"></div></div>
      <div class="prog-lbl" id="plbl">0/10</div>
    </div>
    <div class="dots" id="dots"></div>
  </div>

  <div id="qarea"></div>

  <div class="result" id="result">
    <div id="badge-wrap" style="display:flex;justify-content:center;"></div>
    <div class="r-icon" id="r-icon"></div>
    <div class="r-grade" id="r-grade"></div>
    <div class="r-title" id="r-title"></div>
    <div class="r-msg" id="r-msg"></div>
    <div class="r-grid">
      <div class="r-cell"><div class="r-num" id="rc">0</div><div class="r-lbl">&#31572;&#23565;</div></div>
      <div class="r-cell"><div class="r-num" id="rw">0</div><div class="r-lbl">&#31572;&#37931;</div></div>
      <div class="r-cell"><div class="r-num" id="rp">0%</div><div class="r-lbl">&#27491;&#30906;&#29575;</div></div>
    </div>
    <button class="retry-btn" onclick="restart()">&#37325;&#26032;&#25311;&#25112;</button>
  </div>
</div>

<script>
var QS=[
  {q:"&#25945;&#32244;&#33509;&#35201;&#22312;&#25490;&#29677;&#31995;&#32113;&#20013;&#12300;&#20840;&#26085;&#23553;&#37096;&#12301;&#26576;&#19968;&#22825;&#65292;&#25033;&#20808;&#23436;&#25104;&#21哪&#20491;&#21069;&#32622;&#21205;&#20316;&#65311;",
   q:"教練若要在排班系統中「全日封鎖」某一天，應先完成哪個前置動作？",
   o:["直接在日曆上選擇日期，系統會自動判斷身分","先前往管理後台（/AdminDashboard）確認無待確認預約","先選擇自己的身分（Crystal 或 Joanne），再選取日期","聯絡學員取消當日所有預約後，系統才允許封鎖"],
   a:2,
   f:"根據操作指南第三步，進入排班管理後必須先選擇身分（Crystal 或 Joanne），才能選取日期並進行封鎖設定。"},
  {q:"學員完成預約後，系統自動寄送的確認郵件中包含哪兩項關鍵內容？（請選最完整的答案）",
   o:["學員個人訓練歷史 + 教練的訓練計畫","課程資訊 + 教練 LINE 聯絡方式","付款收據 + 下次課程自動提醒",".ics 行事曆檔案 + 課程評分邀請"],
   a:1,
   f:"指南自動化說明：確認郵件內含「課程資訊」與「教練 LINE」。.ics 檔案是附帶功能，不是主要兩項內容。"},
  {q:"關於「學員回饋（Testimonials）」模組的描述，下列何者不正確？",
   o:["可以新增學員在網頁上的評價","可以刪除特定評價","可以控制評價是否顯示在品牌首頁","可以設定評價的顯示排序與置頂權重"],
   a:3,
   f:"指南中學員回饋模組功能為：管理評論（檢視/新增/刪除）與曝光控制（顯示/隱藏）。排序或置頂功能不存在於指南說明中。"},
  {q:"教練要為「某次已完成課程」新增訓練數據，正確流程是？",
   o:["前往 /StudentProgress，輸入學員 Email，點擊「新增紀錄」","在管理後台的「訊息中心」分頁向學員傳送訓練數值","在管理後台「預約管理」表格中找到該預約，點擊「+ 紀錄」","直接前往 /MyProgress，代替學員手動輸入數據"],
   a:2,
   f:"根據第四步：在「預約管理」表格找到已完成的課程，點擊「+ 紀錄」，依序填寫指標名稱、數值、單位、RPE 及達成率。/StudentProgress 是查詢用途。"},
  {q:"ElitePulse 平台共有幾個主要模組（包含品牌首頁）？",
   o:["四個","五個","六個","七個"],
   a:2,
   f:"指南開頭列出六大模組：品牌首頁 (/)、預約系統 (/Booking)、學員專區 (/MyProgress)、管理後台 (/AdminDashboard)、排班系統 (/CoachSchedule)、數據中心 (/StudentProgress)。"},
  {q:"登入管理後台時，下列哪項描述完全符合指南的規定？",
   o:["Crystal 與 Joanne 各有專屬帳號，分別登入","任何 Gmail 帳號皆可登入，系統透過角色驗證區分","必須使用 elitecoach911@gmail.com 透過 Google 登入","輸入教練代碼後，系統自動以服務帳號完成驗證"],
   a:2,
   f:"指南第一步「重要」警示：請務必使用管理員授權帳號 elitecoach911@gmail.com 登入。使用其他帳號將無法取得管理員權限。"},
  {q:"若教練在「預約管理」分頁想同時確認某筆預約已收款且課程已完成，需操作哪兩個欄位？",
   o:["「狀態」欄位 + 「付款」欄位","「+ 紀錄」按鈕 + 「顯示/隱藏」開關","「篩選功能」+ 「訊息中心」","「垃圾桶」圖示 + 「狀態」欄位"],
   a:0,
   f:"狀態更新：點擊「狀態」欄位調整課表進度；帳務標記：在「付款」欄位手動更新收款狀況。兩者各自獨立操作。"},
  {q:"學員端若想查看自己的訓練歷史與預約紀錄，應前往哪個路徑？",
   o:["/Booking","/AdminDashboard","/MyProgress","/StudentProgress"],
   a:2,
   f:"/MyProgress（學員專區）：學員可自主查看訓練歷史、預約紀錄，並與教練發起通訊。/StudentProgress 是教練端分析工具，需輸入 Email 調閱。"},
  {q:"「訊息中心（Communication）」模組中，教練要回覆學員訊息的操作方式為何？",
   o:["在後台產生自動回覆模板，系統統一發送","點擊左側學員名稱切換對話，右側輸入後按 Enter 送出","透過 /StudentProgress 輸入學員 Email 後發送私訊","在「學員回饋」分頁回覆學員留言"],
   a:1,
   f:"指南通訊中心操作：點擊左側學員名稱即可切換對話，右側輸入內容後按 Enter 即可送出。"},
  {q:"關於 .ics 行事曆附件，下列敘述何者最符合指南說明？",
   o:["需由教練在排班系統手動匯出並寄送給學員","附在確認郵件中，學員可一鍵加入 Google 或 Apple 行事曆，降低曠課率","學員需登入 /MyProgress 後才能下載行事曆檔案","僅支援 Google 行事曆，Apple 行事曆須另行申請開通"],
   a:1,
   f:"指南：郵件內附帶 .ics 檔案，學員可一鍵將課程加入 Google 或 Apple 行事曆，降低曠課率。全自動機制，無需教練手動操作，且兩大平台均支援。"}
];

var cur=0,done=[],ans=new Array(QS.length).fill(-1),locked=false,lockTimer=null,lockCnt=5;

function getAttempts(){try{return parseInt(localStorage.getItem('ep_n')||'0');}catch(e){return 0;}}
function addAttempt(){try{var n=getAttempts()+1;localStorage.setItem('ep_n',String(n));return n;}catch(e){return 1;}}

function initLock(){
  document.addEventListener('visibilitychange',function(){if(document.hidden&&!locked)trigLock();});
  window.addEventListener('blur',function(){if(!locked)trigLock();});
}
function trigLock(){
  if(locked)return;
  locked=true;lockCnt=5;
  var ov=document.getElementById('lo'),cnt=document.getElementById('lo-count'),btn=document.getElementById('lo-btn');
  ov.classList.add('on');btn.style.display='none';cnt.style.display='block';cnt.textContent=lockCnt;
  lockTimer=setInterval(function(){
    lockCnt--;cnt.textContent=lockCnt;
    if(lockCnt<=0){clearInterval(lockTimer);cnt.style.display='none';btn.style.display='inline-block';}
  },1000);
}
function resumeQuiz(){
  locked=false;
  document.getElementById('lo').classList.remove('on');
  document.getElementById('lo-count').style.display='block';
  document.getElementById('lo-btn').style.display='none';
  try{window.focus();}catch(e){}
}

function initDots(){
  var w=document.getElementById('dots');w.innerHTML='';
  for(var i=0;i<QS.length;i++){
    var d=document.createElement('div');
    d.className='dot'+(i===0?' cur':'');d.id='dot'+i;w.appendChild(d);
  }
}
function updateProgress(idx){
  document.getElementById('pfill').style.width=((idx/QS.length)*100)+'%';
  document.getElementById('plbl').textContent=idx+'/'+QS.length;
  for(var i=0;i<QS.length;i++){
    var d=document.getElementById('dot'+i);if(!d)continue;
    d.className='dot';
    if(i<idx)d.classList.add('done');
    else if(i===idx)d.classList.add('cur');
  }
}

function renderQ(idx){
  var q=QS[idx],area=document.getElementById('qarea');
  var isDone=done.indexOf(idx)>-1,ua=ans[idx],keys=['A','B','C','D'];
  var oh='';
  for(var i=0;i<q.o.length;i++){
    var c='opt';
    if(isDone){if(ua===i)c+=(i===q.a?' ok':' err');else if(i===q.a)c+=' hint';}
    else{if(ua===i)c+=' sel';}
    oh+='<button class="'+c+'" id="op'+i+'" onclick="pick('+i+')">'
      +'<span class="opt-key">'+keys[i]+'</span>'
      +'<span style="flex:1">'+q.o[i]+'</span>'
      +'</button>';
  }
  var fbc=isDone?(ua===q.a?'fb ok':'fb err'):'fb';
  var fbt=isDone?(ua===q.a?'&#10003; 答對了！':'&#10007; 答錯了'):'';
  var fbs=isDone?'display:block':'display:none';
  var pd=idx===0?'disabled':'';
  var nb=idx<QS.length-1
    ?'<button class="nav-btn pri" onclick="goNext('+idx+')">下一題 &rarr;</button>'
    :'<button class="nav-btn pri" onclick="submit()">提交測驗</button>';
  var qn=idx<9?'0'+(idx+1):''+(idx+1);
  area.innerHTML='<div class="card">'
    +'<div class="q-num">QUESTION '+qn+' / '+QS.length+'</div>'
    +'<div class="q-text">'+q.q+'</div>'
    +'<div class="q-hint">選擇最正確的答案</div>'
    +'<div class="opts">'+oh+'</div>'
    +'<div class="'+fbc+'" style="'+fbs+'"><div class="fb-title">'+fbt+'</div>'+q.f+'</div>'
    +'<div class="q-nav">'
    +'<button class="nav-btn" onclick="goQ('+(idx-1)+')" '+pd+'>&larr; 上一題</button>'
    +'<span class="score-mini">'+done.length+' / '+QS.length+' 已作答</span>'
    +nb+'</div></div>';
  updateProgress(idx);
}

function pick(i){
  if(done.indexOf(cur)>-1)return;
  ans[cur]=i;
  var ops=document.querySelectorAll('.opt');
  for(var j=0;j<ops.length;j++)ops[j].classList.remove('sel');
  var el=document.getElementById('op'+i);if(el)el.classList.add('sel');
}
function goNext(idx){
  if(done.indexOf(idx)<0&&ans[idx]<0){toast('請選擇答案後再繼續');return;}
  if(done.indexOf(idx)<0)done.push(idx);
  goQ(idx+1);
}
function goQ(idx){
  if(idx<0||idx>=QS.length)return;
  cur=idx;renderQ(idx);window.scrollTo({top:0,behavior:'smooth'});
}

function submit(){
  if(done.indexOf(cur)<0&&ans[cur]<0){toast('請選擇答案後再提交');return;}
  if(done.indexOf(cur)<0)done.push(cur);

  var n=addAttempt(),isFirst=n===1;
  var ords={1:'第 1 次',2:'第 2 次',3:'第 3 次',4:'第 4 次',5:'第 5 次'};
  var ol=ords[n]||('第 '+n+' 次');
  var bw=document.getElementById('badge-wrap');
  bw.innerHTML='<div class="a-badge '+(isFirst?'ok':'bad')+'">'
    +'<span class="a-dot"></span>'
    +'<span>'+(isFirst?'首次作答':'&#9888; 重複作答')+'</span>'
    +'<span style="opacity:.4">&nbsp;&middot;&nbsp;</span>'
    +'<span>'+ol+'提交</span>'
    +'</div>';

  var correct=0;
  for(var i=0;i<QS.length;i++)if(ans[i]===QS[i].a)correct++;
  var wrong=QS.length-correct,pct=Math.round((correct/QS.length)*100);

  document.getElementById('qarea').innerHTML='';
  document.getElementById('pfill').style.width='100%';
  document.getElementById('plbl').textContent=QS.length+'/'+QS.length;

  var tier=pct>=90?90:pct>=70?70:0;
  var icons={90:'&#127942;',70:'&#128203;',0:'&#9888;&#65039;'};
  var msgs={
    90:'您對 ElitePulse 操作指南有深入理解，完全符合上線標準。',
    70:'基本操作流程已掌握，但仍有細節需要複習，建議重新閱讀指南後再測。',
    0:'請重新仔細閱讀操作指南全文，確保每個模組的功能與路徑都清楚理解。'
  };
  var titles={90:'認證通過',70:'勉強及格',0:'未達標準'};

  document.getElementById('r-icon').innerHTML=icons[tier];
  document.getElementById('r-grade').textContent=pct+'%';
  document.getElementById('r-title').textContent=titles[tier];
  document.getElementById('r-msg').textContent=msgs[tier];
  document.getElementById('rc').textContent=correct;
  document.getElementById('rw').textContent=wrong;
  document.getElementById('rp').textContent=pct+'%';
  document.getElementById('result').classList.add('on');

  for(var i=0;i<QS.length;i++){
    var d=document.getElementById('dot'+i);
    if(d){d.className='dot done';d.style.background=ans[i]===QS[i].a?'#27ae60':'#c0392b';}
  }
  window.scrollTo({top:0,behavior:'smooth'});
}

function restart(){
  cur=0;done=[];ans=new Array(QS.length).fill(-1);
  document.getElementById('result').classList.remove('on');
  initDots();renderQ(0);window.scrollTo({top:0,behavior:'smooth'});
}

var tTimer=null;
function toast(msg){
  var el=document.getElementById('toast');el.textContent=msg;el.classList.add('on');
  if(tTimer)clearTimeout(tTimer);
  tTimer=setTimeout(function(){el.classList.remove('on');},2400);
}

initDots();renderQ(0);initLock();
</script>

</body>
</html>
