<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ElitePulse Coaching Certification</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
    font-family:'Inter',sans-serif;
    background:#0b0b0f;
    color:#fff;
    overflow:hidden;
}

/* 背景 */
.bg{
    position:fixed;
    inset:0;
    background:
    radial-gradient(circle at 20% 30%, rgba(255,215,0,0.15), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(140,82,255,0.2), transparent 40%),
    #0b0b0f;
    filter:blur(60px);
    z-index:-1;
}

/* Header */
.header{
    text-align:center;
    margin-bottom:30px;
}
.header h1{
    font-size:2.2rem;
    font-weight:800;
    letter-spacing:1px;
}
.header p{
    color:#aaa;
    margin-top:8px;
}

/* 容器 */
.wrap{
    max-width:600px;
    margin:auto;
    padding:40px 20px;
}

/* 卡片 */
.card{
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:20px;
    padding:30px;
    backdrop-filter:blur(20px);
    animation:fade .5s ease;
}

@keyframes fade{
    from{opacity:0;transform:translateY(20px)}
    to{opacity:1;transform:translateY(0)}
}

/* 問題 */
.q{
    font-size:1.2rem;
    margin-bottom:20px;
    line-height:1.5;
}

/* 選項 */
.opt{
    padding:16px;
    margin:10px 0;
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.1);
    cursor:pointer;
    transition:.2s;
}
.opt:hover{
    border-color:#fff;
    transform:translateY(-2px);
}
.opt.sel{
    border-color:gold;
    background:rgba(255,215,0,0.1);
}

/* 按鈕 */
.btn{
    margin-top:20px;
    padding:14px;
    width:100%;
    border:none;
    border-radius:12px;
    background:linear-gradient(90deg,#8e44ad,gold);
    color:#000;
    font-weight:700;
    cursor:pointer;
}

/* 進度 */
.bar{
    height:6px;
    background:#222;
    border-radius:3px;
    margin-bottom:15px;
    overflow:hidden;
}
.fill{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,#8e44ad,gold);
    transition:.3s;
}

/* 結果 */
.result{
    text-align:center;
    display:none;
}
.score{
    font-size:70px;
    font-weight:800;
    color:gold;
}

/* 鎖 */
.lock{
    position:fixed;
    inset:0;
    background:#000;
    display:none;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    z-index:999;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="wrap">

<div class="header">
<h1>ElitePulse Certification</h1>
<p>Coach Assessment System</p>
</div>

<div class="bar"><div id="fill" class="fill"></div></div>

<div id="app"></div>

<div id="result" class="result">
<div class="score" id="score"></div>
<h2 id="rank"></h2>
<button class="btn" onclick="location.reload()">重新測驗</button>
</div>

</div>

<div id="lock" class="lock">
<h1>FOCUS REQUIRED</h1>
<p>請返回測驗</p>
</div>

<script>
const QS = [
{q:"教練若要在排班系統中「全日封鎖」某一天，應先完成哪個前置動作？", o:["直接在日曆上選擇日期，系統會自動判斷身分","先前往管理後台確認無待確認預約","先選擇自己的身分（Crystal 或 Joanne），再選取日期","聯絡學員取消當日所有預約後，系統才允許封鎖"], a:2},
{q:"學員完成預約後，系統自動寄送的確認郵件中包含哪兩項關鍵內容？", o:["學員個人訓練歷史 + 教練的訓練計畫","課程資訊 + 教練 LINE 聯絡方式","付款收據 + 下次課程自動提醒",".ics 行事曆檔案 + 課程評分邀請"], a:1},
{q:"關於「學員回饋（Testimonials）」模組的描述，下列何者不正確？", o:["可以新增學員在網頁上的評價","可以刪除特定評價","可以控制評價是否顯示在品牌首頁","可以設定評價的顯示排序與置頂權重"], a:3},
{q:"教練要為「某次已完成課程」新增訓練數據，正確流程是？", o:["前往 /StudentProgress，輸入學員 Email","在管理後台的「訊息中心」分頁向學員傳送數值","在管理後台「預約管理」表格點擊「+ 紀錄」","直接前往 /MyProgress，代替學員手動輸入"], a:2},
{q:"ElitePulse 平台共有幾個主要模組（包含品牌首頁）？", o:["四個","五個","六個","七個"], a:2},
{q:"登入管理後台時，下列哪項描述符合指南的規定？", o:["Crystal 與 Joanne 各有專屬帳號","任何 Gmail 帳號皆可登入","必須使用 elitecoach911@gmail.com 登入","輸入教練代碼後自動驗證"], a:2},
{q:"想同時確認某筆預約已收款且課程已完成，需操作哪兩個欄位？", o:["「狀態」欄位 + 「付款」欄位","「+ 紀錄」按鈕 + 「顯示/隱藏」開關","「篩選功能」+ 「訊息中心」","「垃圾桶」圖示 + 「狀態」欄位"], a:0},
{q:"學員端若想查看自己的訓練歷史，應前往哪個路徑？", o:["/Booking","/AdminDashboard","/MyProgress","/StudentProgress"], a:2},
{q:"「訊息中心」中，教練要回覆學員訊息的操作方式為何？", o:["系統統一發送自動回覆","點擊左側學員名稱，右側輸入後按 Enter","透過 /StudentProgress 發送私訊","在「學員回饋」分頁回覆"], a:1},
{q:"關於 .ics 行事曆附件，下列敘述何者正確？", o:["需由教練手動匯出寄送","附在確認郵件中，學員可一鍵加入行事曆","學員需登入後才能下載","僅支援 Google 行事曆"], a:1}
];

let cur=0;
let ans=new Array(QS.length).fill(-1);
let leave=0;

/* render */
function render(){
    const q=QS[cur];

    document.getElementById("app").innerHTML=`
    <div class="card">
        <div class="q">${q.q}</div>
        ${q.o.map((opt,i)=>`
            <div class="opt ${ans[cur]==i?'sel':''}" onclick="pick(${i})">${opt}</div>
        `).join("")}
        <button class="btn" onclick="next()">
        ${cur===QS.length-1?"完成測驗":"下一題"}
        </button>
    </div>
    `;

    document.getElementById("fill").style.width=((cur+1)/QS.length*100)+"%";
}

function pick(i){
    ans[cur]=i;
    render();
}

function next(){
    if(ans[cur]===-1){alert("請先作答");return;}
    if(cur<QS.length-1){cur++;render();}
    else submit();
}

function submit(){
    let correct=0;
    ans.forEach((a,i)=>{if(a===QS[i].a)correct++;});
    let score=Math.round(correct/QS.length*100);

    document.getElementById("app").style.display="none";
    document.getElementById("result").style.display="block";
    document.getElementById("score").innerText=score+"%";
    document.getElementById("rank").innerText=score>=80?"CERTIFIED":"FAILED";
}

/* 防離開 */
document.addEventListener("visibilitychange",()=>{
    if(document.hidden){
        leave++;
        document.getElementById("lock").style.display="flex";
        if(leave>=2){
            alert("測驗失敗");
            location.reload();
        }
    }
});
window.addEventListener("focus",()=>{
    document.getElementById("lock").style.display="none";
});

render();
</script>

</body>
</html>
